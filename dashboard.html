<style>
  :root {
    --bg: #0a0a0b;
    --surface: #111113;
    --surface2: #19191c;
    --border: #222226;
    --border-light: #2a2a2f;
    --text: #e0e0e5;
    --text-dim: #888;
    --text-muted: #555;
    --text-ghost: #333;
    --phase1: #E63946;
    --phase2: #F4A261;
    --phase3: #2A9D8F;
    --green: #2A9D8F;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .app {
    max-width: 520px;
    margin: 0 auto;
    padding-bottom: 40px;
  }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  .header {
    padding: 32px 24px 20px;
    background: linear-gradient(180deg, #131315 0%, var(--bg) 100%);
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .header::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(230,57,70,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .header-label {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .header-title {
    font-family: 'Instrument Serif', serif;
    font-size: 28px;
    font-weight: 400;
    color: #fff;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }

  .header-sub {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 6px;
  }

  .progress-wrap { margin-top: 20px; }

  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--text-muted);
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }

  .progress-bar {
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .quick-btns {
    display: flex;
    gap: 8px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
  }

  .quick-btn {
    flex: 1;
    padding: 11px 10px;
    font-size: 11px;
    font-family: inherit;
    background: var(--surface);
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.3px;
  }

  .quick-btn:hover { border-color: var(--border-light); color: var(--text-dim); }
  .quick-btn.active-supp { background: #131820; color: #81B4D8; border-color: #253040; }
  .quick-btn.active-tgt { background: #1c1320; color: #C77DBA; border-color: #2e2038; }

  .panel {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    animation: panelIn 0.25s ease;
  }

  @keyframes panelIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .panel-card {
    padding: 12px 14px;
    margin-bottom: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    transition: border-color 0.2s;
  }
  .panel-card:hover { border-color: var(--border-light); }

  .supp-name { font-size: 13px; font-weight: 500; color: #81B4D8; }
  .supp-detail { font-size: 10px; color: var(--text-dim); margin-top: 4px; letter-spacing: 0.3px; }
  .supp-why { font-size: 10px; color: var(--text-muted); margin-top: 5px; font-style: italic; line-height: 1.5; }

  .target-card {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .target-metric { font-size: 13px; font-weight: 500; color: #C77DBA; }
  .target-current { font-size: 10px; color: var(--text-muted); margin-top: 3px; }
  .target-goal { font-size: 10px; color: var(--green); text-align: right; max-width: 150px; line-height: 1.4; }

  .phase-tabs {
    display: flex;
    padding: 14px 24px 0;
    gap: 6px;
  }

  .phase-tab {
    flex: 1;
    padding: 11px 6px;
    font-size: 10px;
    font-family: inherit;
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 10px 10px 0 0;
    border-bottom: 2px solid var(--border);
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.3px;
  }

  .phase-tab:hover { color: var(--text-dim); }

  .phase-tab.active { border-bottom-width: 2px; border-bottom-style: solid; }

  .phase-tab-dates {
    font-size: 9px;
    margin-top: 3px;
    opacity: 0.5;
  }

  .day-selector {
    display: flex;
    gap: 5px;
    padding: 14px 24px;
    overflow-x: auto;
    border-bottom: 1px solid var(--border);
    scrollbar-width: thin;
  }

  .day-btn {
    min-width: 48px;
    padding: 9px 7px;
    font-size: 10px;
    font-family: inherit;
    background: var(--surface);
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    position: relative;
    transition: all 0.2s ease;
    flex-shrink: 0;
  }

  .day-btn:hover { border-color: var(--border-light); }
  .day-btn .day-label { font-weight: 500; }
  .day-btn .day-progress-label { font-size: 8px; margin-top: 3px; opacity: 0.6; }
  .day-btn .day-check {
    position: absolute;
    top: -5px; right: -5px;
    font-size: 10px;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5));
  }

  .day-content { padding: 20px 24px; }

  .day-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 18px;
  }

  .day-date { font-size: 16px; font-weight: 700; color: #fff; }
  .day-date.highlight { color: var(--green); }
  .game-day-label {
    font-size: 10px;
    color: var(--green);
    letter-spacing: 3px;
    margin-top: 3px;
    text-transform: uppercase;
  }
  .day-counter { font-size: 12px; color: var(--text-ghost); }

  .task-item {
    display: flex;
    gap: 12px;
    padding: 13px 14px;
    margin-bottom: 8px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
    border: 1px solid;
    user-select: none;
    -webkit-user-select: none;
  }

  .task-item:hover { transform: translateX(2px); }
  .task-item.done { opacity: 0.4; }
  .task-item.done:hover { opacity: 0.55; }

  .task-check {
    width: 22px; height: 22px;
    border-radius: 6px;
    flex-shrink: 0;
    margin-top: 1px;
    border: 2px solid;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    transition: all 0.2s ease;
  }

  .task-cat {
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 4px;
    font-weight: 500;
  }

  .task-text {
    font-size: 12.5px;
    line-height: 1.55;
    color: #ccc;
  }

  .task-item.done .task-text {
    color: #444;
    text-decoration: line-through;
  }

  .footer {
    padding: 24px;
    border-top: 1px solid var(--border);
    font-size: 10px;
    color: var(--text-ghost);
    text-align: center;
    line-height: 1.7;
    letter-spacing: 0.3px;
  }

  .today-badge {
    display: inline-block;
    padding: 2px 8px;
    font-size: 8px;
    background: var(--green);
    color: #000;
    border-radius: 4px;
    font-weight: 700;
    letter-spacing: 1px;
    margin-left: 6px;
    vertical-align: middle;
  }

  @keyframes taskEnter {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .task-item { animation: taskEnter 0.2s ease backwards; }
  .task-item:nth-child(1) { animation-delay: 0s; }
  .task-item:nth-child(2) { animation-delay: 0.03s; }
  .task-item:nth-child(3) { animation-delay: 0.06s; }
  .task-item:nth-child(4) { animation-delay: 0.09s; }
  .task-item:nth-child(5) { animation-delay: 0.12s; }
  .task-item:nth-child(6) { animation-delay: 0.15s; }
  .task-item:nth-child(7) { animation-delay: 0.18s; }
  .task-item:nth-child(8) { animation-delay: 0.21s; }
  .task-item:nth-child(9) { animation-delay: 0.24s; }
  .task-item:nth-child(10) { animation-delay: 0.27s; }
</style>
</head>

  nutrition:  { bg: "#101c16", text: "#6BCB77", border: "#1c3025" },
  exercise:   { bg: "#1e1212", text: "#E07A5F", border: "#351e1e" },
  lifestyle:  { bg: "#1e1a10", text: "#F2CC8F", border: "#352e1a" },
  supplement: { bg: "#101620", text: "#81B4D8", border: "#1c2535" },
  whoop:      { bg: "#1c1020", text: "#C77DBA", border: "#2e1c35" },
  morning:    { bg: "#1e1e10", text: "#E8D44D", border: "#35351c" },
  mindset:    { bg: "#101e1e", text: "#4ECDC4", border: "#1c3535" },
};

const CAT_ICONS = {
  sleep: "\u{1F319}", nutrition: "\u{1F966}", exercise: "\u{1F4AA}",
  lifestyle: "\u2600\uFE0F", supplement: "\u{1F48A}", whoop: "\u231A",
  morning: "\u{1F305}", mindset: "\u{1F9E0}",
};

const STORAGE_KEY = "peak-plan-tasks-v2";

function getTodayDayIndex() {
  const dayMap = {
    "2026-04-14": [0, 0], "2026-04-15": [0, 1], "2026-04-16": [0, 2],
    "2026-04-17": [0, 3], "2026-04-18": [0, 4], "2026-04-19": [0, 5],
    "2026-04-20": [0, 6], "2026-04-21": [1, 0], "2026-04-22": [1, 1],
    "2026-04-23": [1, 2], "2026-04-24": [1, 3], "2026-04-25": [1, 4],
    "2026-04-26": [1, 5], "2026-04-27": [1, 6], "2026-04-28": [2, 0],
    "2026-04-29": [2, 1], "2026-04-30": [2, 2], "2026-05-01": [2, 3],
  };
  const today = new Date();
  const key = today.getFullYear() + "-" +
    String(today.getMonth() + 1).padStart(2, "0") + "-" +
    String(today.getDate()).padStart(2, "0");
  return dayMap[key] || [0, 0];
}

function PeakPlan() {
  const [todayPhase, todayDay] = getTodayDayIndex();
  const [completedTasks, setCompletedTasks] = useState({});
  const [activePhase, setActivePhase] = useState(todayPhase);
  const [activeDay, setActiveDay] = useState(todayDay);
  const [showSupplements, setShowSupplements] = useState(false);
  const [showTargets, setShowTargets] = useState(false);

  useEffect(() => {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) setCompletedTasks(JSON.parse(saved));
    } catch (e) {}
  }, []);

  useEffect(() => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(completedTasks));
    } catch (e) {}
  }, [completedTasks]);

  const toggleTask = (pi, di, ti) => {
    const key = `${pi}-${di}-${ti}`;
    setCompletedTasks(prev => ({ ...prev, [key]: !prev[key] }));
  };

  const getProgress = () => {
    let total = 0, done = 0;
    PLAN_DATA.phases.forEach((phase, pi) => {
      phase.days.forEach((day, di) => {
        day.tasks.forEach((_, ti) => {
          total++;
          if (completedTasks[`${pi}-${di}-${ti}`]) done++;
        });
      });
    });
    return { total, done, pct: total > 0 ? Math.round((done / total) * 100) : 0 };
  };

  const getDayProgress = (pi, di) => {
    const day = PLAN_DATA.phases[pi].days[di];
    let done = 0;
    day.tasks.forEach((_, ti) => { if (completedTasks[`${pi}-${di}-${ti}`]) done++; });
    return { done, total: day.tasks.length };
  };

  const isToday = (pi, di) => pi === todayPhase && di === todayDay;

  const progress = getProgress();
  const currentPhase = PLAN_DATA.phases[activePhase];
  const currentDay = currentPhase.days[activeDay];

  return h('div', { className: 'app' },

    h('div', { className: 'header' },
      h('div', { className: 'header-label' }, '17-Day Protocol'),
      h('div', { className: 'header-title' }, 'Peak Performance Plan'),
      h('div', { className: 'header-sub' }, 'Apr 14 \u2192 May 1  \u00B7  Based on your WHOOP data'),
      h('div', { className: 'progress-wrap' },
        h('div', { className: 'progress-info' },
          h('span', null, `${progress.done}/${progress.total} tasks`),
          h('span', null, `${progress.pct}%`),
        ),
        h('div', { className: 'progress-bar' },
          h('div', {
            className: 'progress-fill',
            style: {
              width: `${progress.pct}%`,
              background: `linear-gradient(90deg, ${currentPhase.color}, ${currentPhase.color}88)`,
            },
          }),
        ),
      ),
    ),

    h('div', { className: 'quick-btns' },
      h('button', {
        className: `quick-btn ${showSupplements ? 'active-supp' : ''}`,
        onClick: () => { setShowSupplements(!showSupplements); setShowTargets(false); },
      }, `\u{1F48A} Supplements`),
      h('button', {
        className: `quick-btn ${showTargets ? 'active-tgt' : ''}`,
        onClick: () => { setShowTargets(!showTargets); setShowSupplements(false); },
      }, `\u231A WHOOP Targets`),
    ),

    showSupplements && h('div', { className: 'panel' },
      PLAN_DATA.supplements.map((s, i) =>
        h('div', { key: i, className: 'panel-card' },
          h('div', { className: 'supp-name' }, s.name),
          h('div', { className: 'supp-detail' }, `${s.dose} \u00B7 ${s.timing}`),
          h('div', { className: 'supp-why' }, s.why),
        )
      ),
    ),

    showTargets && h('div', { className: 'panel' },
      PLAN_DATA.targets.map((t, i) =>
        h('div', { key: i, className: 'panel-card target-card' },
          h('div', null,
            h('div', { className: 'target-metric' }, t.metric),
            h('div', { className: 'target-current' }, `Now: ${t.current}`),
          ),
          h('div', { className: 'target-goal' }, `\u2192 ${t.target}`),
        )
      ),
    ),

    h('div', { className: 'phase-tabs' },
      PLAN_DATA.phases.map((phase, idx) =>
        h('button', {
          key: idx,
          className: `phase-tab ${activePhase === idx ? 'active' : ''}`,
          style: activePhase === idx ? {
            background: `${phase.color}12`,
            color: phase.color,
            borderColor: `${phase.color}35`,
            borderBottomColor: phase.color,
          } : {},
          onClick: () => { setActivePhase(idx); setActiveDay(0); },
        },
          phase.name.split(':')[0],
          h('div', { className: 'phase-tab-dates' }, phase.dates),
        )
      ),
    ),

    h('div', { className: 'day-selector' },
      currentPhase.days.map((day, idx) => {
        const dp = getDayProgress(activePhase, idx);
        const isComplete = dp.done === dp.total && dp.total > 0;
        const isActive = activeDay === idx;
        const isTodayDay = isToday(activePhase, idx);
        return h('button', {
          key: idx,
          className: 'day-btn',
          style: {
            background: isActive ? `${currentPhase.color}18` : isComplete ? '#0a160a' : 'var(--surface)',
            color: isActive ? currentPhase.color : isComplete ? 'var(--green)' : 'var(--text-muted)',
            borderColor: isActive ? `${currentPhase.color}45` : isComplete ? '#1a3a1a' : 'var(--border)',
          },
          onClick: () => setActiveDay(idx),
        },
          h('div', { className: 'day-label' },
            day.label,
            isTodayDay ? h('span', { className: 'today-badge' }, 'TODAY') : null,
          ),
          dp.done > 0 ? h('div', { className: 'day-progress-label' }, `${dp.done}/${dp.total}`) : null,
          isComplete ? h('div', { className: 'day-check' }, '\u2705') : null,
        );
      }),
    ),

    h('div', { className: 'day-content' },
      h('div', { className: 'day-header' },
        h('div', null,
          h('div', { className: `day-date ${currentDay.highlight ? 'highlight' : ''}` }, currentDay.date),
          currentDay.highlight ? h('div', { className: 'game-day-label' }, 'GAME DAY') : null,
        ),
        h('div', { className: 'day-counter' },
          `${getDayProgress(activePhase, activeDay).done}/${getDayProgress(activePhase, activeDay).total}`),
      ),
      currentDay.tasks.map((task, ti) => {
        const key = `${activePhase}-${activeDay}-${ti}`;
        const done = !!completedTasks[key];
        const catStyle = CAT_COLORS[task.cat] || CAT_COLORS.lifestyle;
        return h('div', {
          key: ti,
          className: `task-item ${done ? 'done' : ''}`,
          style: {
            background: done ? '#080808' : catStyle.bg,
            borderColor: done ? 'var(--border)' : catStyle.border,
          },
          onClick: () => toggleTask(activePhase, activeDay, ti),
        },
          h('div', {
            className: 'task-check',
            style: {
              borderColor: done ? 'var(--green)' : `${catStyle.text}40`,
              background: done ? 'rgba(42,157,143,0.15)' : 'transparent',
              color: 'var(--green)',
            },
          }, done ? '\u2713' : ''),
          h('div', { style: { flex: 1 } },
            h('div', { className: 'task-cat', style: { color: catStyle.text } },
              `${CAT_ICONS[task.cat] || ''} ${task.cat}`),
            h('div', { className: 'task-text' }, task.text),
          ),
        );
      }),
    ),

    h('div', { className: 'footer' },
      'Non-negotiables every day: Sleep 22:30\u201306:00 \u00B7 160g protein \u00B7 10K steps \u00B7 Zero nicotine \u00B7 Zero alcohol \u00B7 Morning sunlight'),
  );
}

createRoot(document.getElementById('root')).render(h(PeakPlan));
</script>
</body>
</html>
